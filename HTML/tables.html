<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
    <style>
        table{
            width: 70%;
            border-collapse: collapse;
            margin: 30px auto;
        }

        th,td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th{
            background-color: #007bff;
            color: white;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>CGPA</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Paulraj</td>
            <td>CSE</td>
            <td>8.5</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Arun</td>
            <td>IT</td>
            <td>8.2</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Karthik</td>
            <td>ECE</td>
            <td>8.7</td>
        </tr>
    </table>

</body>
</html>
