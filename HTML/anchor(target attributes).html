<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperlink Operations</title>
    <style>
        body {
            background-color: #c77b86;
            text-align: center;
        }
        header {
            color: #00cc99;
            margin-top: 20px;
        }
        a {
            display: block;
            margin: 15px;
            color: purple;
        }
    </style>
</head>
<body>

    <header>
        <h1>HyperLink Operations with target Attribute</h1>
    </header>

    <a href="https://www.gradious.com" target="_blank">
        Click Here to open in new tab
    </a>

    <a href="https://www.gradious.com" target="_self">
        Click Here to open in Same tab
    </a>

    <a href="https://www.gradious.com" target="_blank" onclick="window.open(this.href,'_blank','width=800,height=600'); return false;">
        Click Here to open in new window
    </a>

</body>
</html>
