<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0%;
      }
      .main {
        height: 100vh;
        width: 100vw;
        position: relative;
        background-color: rgb(0, 0, 0);
      }
      .box {
        height: 70vh;
        width: 50vw;
        background-color: rgb(35, 33, 33);
        position: absolute;
        top: 15vh;
        left: 25vw;
        border-radius: 50px;
        border: 2px solid white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #reset {
        width: 4vw;
      }
      #submit {
        width: 4vw;
      }
      h1 {
        color: white;
      }
      h4 {
        color: white;
        font-size: larger;
      }
      input {
        border-radius: 10px;
        height: 4vh;
        width: 25vw;
        background-color: rgb(58, 53, 53);
        color: white;
      }
      ::placeholder {
        color: rgb(255, 255, 255);
      }
      input[type="date"] {
        color: white;
      }
      input[type=submit]{
        background-color: rgb(54, 49, 49);
        border: 2px solid white;
        color: white;
      }
      input[type=submit]:hover{
        background-color: rgb(119, 181, 247);
        border: 2px solid white;
        color: white;
      }
      input[type=reset]{
        background-color: rgb(54, 49, 49);
        border: 2px solid white;
        color: white;
      }
      input[type=reset]:hover{
        background-color: rgb(119, 181, 247);
        border: 2px solid white;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="box">
        <h1>Loging here</h1>
        <table>
          <form action="">
            <tr>
              <td>
                <h4>Name :</h4>
              </td>
              <td>
                <input type="text" placeholder="Enter your Name" />
              </td>
            </tr>
            <tr>
              <td>
                <h4>E-mail Id :</h4>
              </td>
              <td>
                <input type="email" placeholder="Enter your Email id" />
              </td>
            </tr>
            <tr>
              <td>
                <h4>Password :</h4>
              </td>
              <td>
                <input type="text" placeholder="Enter your password" />
              </td>
            </tr>
            <tr>
              <td>
                <h4>Date Of Birth :</h4>
              </td>
              <td>
                <input type="date" placeholder="Enter your user name" />
              </td>
            </tr>

            <tr>
              <td><input type="reset" id="reset" /></td>
              <td><input type="submit" id="submit" /></td>
            </tr>
          </form>
        </table>
      </div>
    </div>
  </body>
</html>
